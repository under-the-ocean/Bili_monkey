<style>/* ========== Design Tokens —— 匹配服务端 Admin One Tailwind 暗色风格 ========== */
:root{--tm-primary:#06b6d4;--tm-primary-dark:#0891b2;--tm-primary-light:#22d3ee;--tm-accent:#ef4444;--tm-accent-dark:#dc2626;--tm-bg:#09090b;--tm-bg-card:rgba(24,24,27,0.92);--tm-text:#f4f4f5;--tm-text-secondary:#a1a1aa;--tm-text-hint:#71717a;--tm-divider:rgba(255,255,255,0.08);--tm-input-bg:rgba(255,255,255,0.05);--tm-surface:rgba(255,255,255,0.04);--tm-surface-hover:rgba(255,255,255,0.08);--tm-shadow:0 16px 48px rgba(0,0,0,0.45);--tm-shadow-btn:0 2px 8px rgba(0,0,0,0.3);--tm-radius:12px;--tm-radius-btn:8px;--tm-radius-chip:32px;--tm-font:'SDK_SC_Web','Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;--tm-transition:0.18s ease}
#biliauto-fab{position:fixed;right:18px!important;bottom:18px!important;z-index:2147483647;width:44px;height:44px;border-radius:50%;background:#06b6d4;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(6,182,212,0.3);transition:opacity .2s,transform .2s,box-shadow .2s;user-select:none;-webkit-user-select:none}
#biliauto-fab.tm-fab-hidden{opacity:0;transform:scale(.4);pointer-events:none}
#biliauto-fab:hover{box-shadow:0 6px 24px rgba(6,182,212,0.45);transform:scale(1.06)}
#biliauto-fab:active{transform:scale(.94)}
#biliauto-fab svg{display:block}
#biliauto-panel{position:fixed;right:18px;bottom:18px;width:380px;max-width:calc(100vw - 24px);max-height:calc(100vh - 24px);z-index:2147483646;font-family:var(--tm-font);color:var(--tm-text);background:rgba(24,24,27,0.94);border:1px solid rgba(255,255,255,0.08);border-radius:var(--tm-radius);box-shadow:var(--tm-shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);overflow:hidden;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:scale(.96);transition:opacity .22s ease,transform .22s ease;resize:both;min-width:300px;min-height:240px}
#biliauto-panel.tm-panel-visible{opacity:1;transform:scale(1);pointer-events:auto}
#biliauto-panel,#biliauto-panel *{box-sizing:border-box}
.tm-cyber-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;min-height:42px;cursor:grab;user-select:none;-webkit-user-select:none;border-bottom:1px solid var(--tm-divider);flex-shrink:0}
.tm-cyber-header:active{cursor:grabbing}
.tm-cyber-header-title{font-size:13px;font-weight:600;color:var(--tm-text);display:flex;align-items:center;gap:8px}
.tm-cyber-brand{color:var(--tm-primary)}
.tm-cyber-header-badge{font-size:10px;font-weight:500;color:var(--tm-primary-light);background:rgba(6,182,212,0.12);padding:1px 8px;border-radius:10px;border:1px solid rgba(6,182,212,0.18)}
.tm-cyber-header-actions{display:flex;gap:2px;cursor:default}
.tm-cyber-icon-btn{width:28px;height:28px;border:none;border-radius:6px;background:transparent;color:var(--tm-text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-size:13px;transition:background .15s,color .15s}
.tm-cyber-icon-btn:hover{background:var(--tm-surface-hover);color:var(--tm-text)}
.tm-cyber-icon-btn:active{transform:scale(.92)}
.tm-cyber-body{padding:10px 14px;overflow-y:auto;min-height:0;flex:1}
.tm-cyber-meta{font-size:11px;color:var(--tm-text-secondary);line-height:1.7;background:var(--tm-surface);padding:8px 12px;border-radius:var(--tm-radius-btn);border:1px solid var(--tm-divider);font-family:"SF Mono","Cascadia Code",monospace;word-break:break-all}
.tm-cyber-input{width:100%;border:1px solid var(--tm-divider);border-radius:var(--tm-radius-btn);background:var(--tm-input-bg);color:var(--tm-text);padding:8px 12px;outline:none;font-size:12px;font-family:var(--tm-font);transition:border-color .15s}
.tm-cyber-input:focus{border-color:var(--tm-primary)}
.tm-cyber-input::placeholder{color:var(--tm-text-hint)}
.tm-cyber-input-row{display:flex;gap:8px}
.tm-cyber-input-row .tm-cyber-input{flex:1}
.tm-cyber-btn{display:inline-flex;align-items:center;justify-content:center;height:30px;padding:0 12px;border:1px solid var(--tm-divider);border-radius:var(--tm-radius-btn);background:transparent;color:var(--tm-text-secondary);font-size:12px;font-weight:500;font-family:var(--tm-font);cursor:pointer;user-select:none;white-space:nowrap;transition:background .15s,color .15s,transform .12s}
.tm-cyber-btn:hover{background:var(--tm-surface-hover);color:var(--tm-text);border-color:rgba(255,255,255,0.12)}
.tm-cyber-btn:active{transform:scale(.97)}
.tm-cyber-btn-primary{background:#06b6d4;color:#fff;border:none}
.tm-cyber-btn-primary:hover{background:#0891b2;color:#fff}
.tm-cyber-btn-accent{color:var(--tm-accent);border-color:rgba(239,68,68,0.2)}
.tm-cyber-btn-accent:hover{background:rgba(239,68,68,0.1);color:var(--tm-accent)}
.tm-cyber-btn-sm{height:26px;padding:0 10px;font-size:11px}
.tm-cyber-btn-xs{height:22px;padding:0 8px;font-size:10px;border-radius:6px}
.tm-cyber-chip{display:inline-flex;align-items:center;height:26px;padding:0 10px;border-radius:var(--tm-radius-chip);background:rgba(6,182,212,0.08);color:var(--tm-primary-light);font-size:11px;font-weight:500;border:1px solid rgba(6,182,212,0.12)}
.tm-cyber-check{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--tm-text);cursor:pointer}
.tm-cyber-check input[type=checkbox]{appearance:none;-webkit-appearance:none;width:16px;height:16px;border:2px solid var(--tm-text-hint);border-radius:4px;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s}
.tm-cyber-check input[type=checkbox]:checked{border-color:var(--tm-primary);background:var(--tm-primary)}
.tm-cyber-check input[type=checkbox]:checked::after{content:'';display:block;width:4px;height:7px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-1px}
.tm-cyber-card{border:1px solid var(--tm-divider);border-radius:var(--tm-radius-btn);padding:10px 12px;margin-bottom:8px;background:rgba(255,255,255,0.025);animation:tm-rise-in .35s ease both}
.tm-cyber-card-title{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11px;color:var(--tm-text-secondary);font-weight:600;margin-bottom:8px}
.tm-cyber-hero{border:1px solid var(--tm-divider);border-radius:var(--tm-radius-btn);padding:12px;margin-bottom:8px;background:rgba(255,255,255,0.025);animation:tm-rise-in .35s ease both}
.tm-cyber-hero-main{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px}
.tm-cyber-kicker{font-size:9px;color:var(--tm-primary-light);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.tm-cyber-hero-title{font-size:15px;font-weight:700;color:var(--tm-text);margin-bottom:2px}
.tm-cyber-hero-subtitle{font-size:11px;color:var(--tm-text-secondary)}
.tm-cyber-hero-actions{display:flex;gap:8px;margin-bottom:10px}
.tm-cyber-btn-hero{height:32px;border-radius:8px;flex:1;font-weight:600}
.tm-cyber-config-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.tm-cyber-config-field{display:block}
.tm-cyber-config-field span{display:block;font-size:9px;color:var(--tm-text-hint);margin:0 0 2px 2px}
.tm-cyber-config-field .tm-cyber-input{text-align:center;padding:6px 8px;font-size:11px}
.tm-cyber-task-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.tm-cyber-task-head-left{display:flex;align-items:center;gap:8px}
.tm-cyber-filter{width:120px}
.tm-cyber-list{max-height:260px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent}
.tm-cyber-list::-webkit-scrollbar{width:4px}
.tm-cyber-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
.tm-cyber-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-radius:var(--tm-radius-btn);margin-bottom:6px;background:var(--tm-surface);border:1px solid var(--tm-divider);animation:tm-rise-in .3s ease both;transition:background .15s,border-color .15s}
.tm-cyber-item:hover{background:var(--tm-surface-hover);border-color:rgba(255,255,255,0.1)}
.tm-cyber-item-title{font-size:12px;font-weight:500;color:var(--tm-text);margin-bottom:2px}
.tm-cyber-item-id{font-size:10px;color:var(--tm-primary-light);font-family:"SF Mono",monospace}
.tm-cyber-item-actions{flex-shrink:0;display:flex;gap:4px}
.tm-cyber-empty{padding:24px;text-align:center;color:var(--tm-text-hint);font-size:12px}
.tm-cyber-status{font-size:11px;color:var(--tm-text-secondary);text-align:center;padding-top:8px}
.tm-cyber-footer-tools{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.tm-cyber-update-tip{margin-bottom:10px;padding:8px 12px;border:1px solid rgba(6,182,212,0.2);background:rgba(6,182,212,0.06);border-radius:8px;color:var(--tm-text-secondary);font-size:11px;line-height:1.5}
.tm-cyber-update-tip b{color:var(--tm-primary-light)}
#biliauto-login-overlay{position:fixed;inset:0;z-index:2147483647;background:rgba(9,9,11,0.88);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;font-family:var(--tm-font);padding:16px;opacity:0;pointer-events:none;transition:opacity .3s ease}
#biliauto-login-overlay.tm-overlay-visible{opacity:1;pointer-events:auto}
#biliauto-login-overlay *{box-sizing:border-box}
.cyber-login-card{width:min(380px,92vw);background:rgba(24,24,27,0.96);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,0.5)}
.cyber-login-header{text-align:center;margin-bottom:20px}
.cyber-login-icon{width:48px;height:48px;margin:0 auto 12px;background:#06b6d4;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff}
.cyber-login-icon svg{width:24px;height:24px}
.cyber-login-title{font-size:18px;font-weight:700;color:var(--tm-text);margin:0 0 4px}
.cyber-login-subtitle{font-size:12px;color:var(--tm-text-secondary);margin:0}
.cyber-login-code-section{background:rgba(6,182,212,0.05);border:1px solid rgba(6,182,212,0.12);border-radius:10px;padding:14px;margin-bottom:14px;text-align:center}
.cyber-login-code-label{font-size:10px;font-weight:600;color:var(--tm-primary-light);letter-spacing:.1em;margin-bottom:10px}
.cyber-login-code-chars{display:flex;justify-content:center;gap:6px}
.cyber-login-code-char{width:38px;height:46px;background:rgba(0,0,0,0.3);border:1px solid rgba(6,182,212,0.18);border-radius:6px;font-size:20px;font-weight:700;color:var(--tm-primary-light);font-family:"SF Mono",monospace;display:flex;align-items:center;justify-content:center}
.cyber-login-info{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid var(--tm-divider);margin-bottom:14px}
.cyber-login-info-icon{width:30px;height:30px;background:rgba(6,182,212,0.08);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--tm-primary);flex-shrink:0}
.cyber-login-info-icon svg{width:15px;height:15px}
.cyber-login-info-text{font-size:11px;color:var(--tm-text-secondary)}
.cyber-login-info-text strong{color:var(--tm-primary-light);font-weight:600}
.cyber-login-status{font-size:12px;color:var(--tm-text-secondary);text-align:center;margin-bottom:12px;min-height:18px}
.cyber-login-btn{width:100%;height:40px;border:none;border-radius:8px;background:#06b6d4;color:#fff;font-size:13px;font-weight:600;font-family:var(--tm-font);cursor:pointer;transition:background .15s,transform .12s}
.cyber-login-btn:hover{background:#0891b2}
.cyber-login-btn:active{transform:scale(.98)}
.cyber-login-btn:disabled{opacity:.5;cursor:not-allowed}
.tm-cyber-status-badge{font-size:10px;color:var(--tm-primary-light);background:rgba(6,182,212,0.08);padding:1px 8px;border-radius:8px;margin-left:4px;white-space:nowrap;border:1px solid rgba(6,182,212,0.12);font-weight:500}
.tm-cyber-log-wrap{font-size:12px;color:#52525b;line-height:1.6}
.tm-cyber-log-header{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #e4e4e7;margin-bottom:8px;font-size:11px;color:#18181b}
.tm-cyber-log-countdown{color:#52525b;font-weight:600;font-family:"SF Mono",monospace}
.tm-cyber-log-scroll{max-height:200px;overflow-y:auto;white-space:pre-wrap;font-family:"SF Mono",monospace;font-size:11px;color:#3f3f46;scrollbar-width:thin}
.tm-cyber-log-scroll::-webkit-scrollbar{width:4px}
.tm-cyber-log-scroll::-webkit-scrollbar-thumb{background:#d4d4d8;border-radius:4px}
.tm-cyber-log-status{display:flex;justify-content:space-between;padding-top:8px;margin-top:8px;border-top:1px solid #e4e4e7;font-size:11px;color:#71717a}
.tm-cyber-log-task-count{color:#3f3f46;font-weight:600}
@keyframes tm-rise-in{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
@media(max-width:600px){#biliauto-panel{width:calc(100vw - 24px);left:12px!important;right:12px!important}.tm-cyber-config-grid{grid-template-columns:1fr}.tm-cyber-task-head{flex-direction:column;align-items:stretch}.tm-cyber-filter{width:100%}.tm-cyber-hero-actions{flex-direction:column}.cyber-login-code-char{width:32px;height:40px;font-size:16px}}</style>

<!-- ========== Main Panel Skeleton ========== -->
<div class="tm-cyber-header">
  <span class="tm-cyber-header-title">
    <span class="tm-cyber-brand">BiliAuto</span>
    <span class="tm-cyber-header-badge">v${CONFIG.VERSION}</span>
    <span class="tm-cyber-status-badge" data-ba="loginStatusBadge" style="display:${CONFIG.QQ_ID?'':'none'}">✅ ${CONFIG.ACCOUNT_NAME}</span>
  </span>
  <span class="tm-cyber-header-actions">
    <button class="tm-cyber-icon-btn" data-ba="logout" title="退出登录" style="display:${CONFIG.QQ_ID?'':'none'}">🚪</button>
    <button class="tm-cyber-icon-btn" data-ba="copyPageInfo" title="复制当前页面信息">📋</button>
    <button class="tm-cyber-icon-btn" data-ba="toggleDark" title="切换夜间模式">🌙</button>
    <button class="tm-cyber-icon-btn" data-ba="closePanel" title="关闭面板">✕</button>
  </span>
</div>

<div class="tm-cyber-body">

  <section class="tm-cyber-hero">
    <div class="tm-cyber-hero-main">
      <div>
        <div class="tm-cyber-kicker">MISSION CONTROL</div>
        <div class="tm-cyber-hero-title">任务执行中枢</div>
        <div class="tm-cyber-hero-subtitle">执行功能统一上移，列表中的 TaskID 仅用于快速跳转。</div>
      </div></div>

    <div class="tm-cyber-update-tip">
      <b>更新提示：</b>若脚本异常、时间不生效、自然语言时间不识别或面板不显示，请在油猴扩展中打开本脚本并执行“检查更新”；若曾手动改过脚本，需要重新安装最新脚本。
    </div>
    <div class="tm-cyber-hero-actions">
      <button class="tm-cyber-btn tm-cyber-btn-primary tm-cyber-btn-hero" data-ba="runCurrent">执行当前</button>
      <button class="tm-cyber-btn tm-cyber-btn-hero" data-ba="runAll">执行选中</button>
      <button class="tm-cyber-btn tm-cyber-btn-hero tm-cyber-btn-accent" data-ba="testClick">测试点击</button>
    </div>
    <div class="tm-cyber-config-grid" data-ba="currentTaskConfig">
      <label class="tm-cyber-config-field"><span>开始时间</span><input class="tm-cyber-input" data-field="start_time" type="time" step="1" placeholder="20:00:00" title="可点开时间控件选择；也可手动输入 20点、20点半、20:00、30秒后、1分30秒后、+30、立即"></label>
      <label class="tm-cyber-config-field"><span>点击间隔</span><input class="tm-cyber-input" data-field="interval" placeholder="秒" title="点击间隔(秒)"></label>
      <label class="tm-cyber-config-field"><span>持续时长</span><input class="tm-cyber-input" data-field="duration" placeholder="秒" title="持续时长(秒)"></label>
    </div>
  </section>

  <section class="tm-cyber-card">
    <div class="tm-cyber-card-title">
      <span>当前页面</span>
      <small>强制登录保持启用</small>
    </div>
    <div class="tm-cyber-meta" data-ba="meta"></div>
  </section>

  <section class="tm-cyber-card">
    <div class="tm-cyber-card-title">
      <span>TaskID 跳转</span>
      <small>添加或手动输入后仅跳转</small>
    </div>
    <div class="tm-cyber-input-row">
      <input class="tm-cyber-input" data-ba="addTaskInput" placeholder="添加 task_id 到快捷列表">
      <button class="tm-cyber-btn" data-ba="addTask">添加</button>
    </div>
    <div class="tm-cyber-input-row">
      <input class="tm-cyber-input" data-ba="manual" placeholder="输入 task_id 后立即跳转">
      <button class="tm-cyber-btn tm-cyber-btn-primary" data-ba="manualJump">跳转</button>
    </div>
  </section>

  <section class="tm-cyber-card">
    <div class="tm-cyber-task-head">
      <div class="tm-cyber-task-head-left">
        <span class="tm-cyber-chip" data-ba="taskCount">0 个任务</span>
      </div>
      <input class="tm-cyber-input tm-cyber-filter" data-ba="filter" placeholder="筛选任务名称或 ID">
    </div>
    <div class="tm-cyber-list" data-ba="list"></div>
  </section>

  <div class="tm-cyber-footer-tools">
    <button class="tm-cyber-btn tm-cyber-btn-sm" data-ba="refresh">刷新</button>
    <button class="tm-cyber-btn tm-cyber-btn-sm" data-ba="defaults">重置</button>
    <button class="tm-cyber-btn tm-cyber-btn-sm" data-ba="copyPageInfo">复制页面</button>
    <button class="tm-cyber-btn tm-cyber-btn-sm tm-cyber-btn-accent" data-ba="clearAll">清空</button>
    <button class="tm-cyber-btn tm-cyber-btn-sm tm-cyber-btn-accent" data-ba="logout" style="display:${CONFIG.QQ_ID?'':'none'}">退出</button>
  </div>

  <div class="tm-cyber-status" data-ba="status"></div>
</div>

<!-- ========== Sub Templates ========== -->

<template id="tmpl-fab">
<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M12 2L2 7l10 5 10-5-10-5z"/>
  <path d="M2 17l10 5 10-5"/>
  <path d="M2 12l10 5 10-5"/>
</svg>
</template>

<template id="tmpl-error">
<div style="padding:24px;text-align:center;font-family:sans-serif;">
  <div style="font-size:32px;margin-bottom:12px;opacity:0.5">⚠️</div>
  <div style="font-size:15px;color:var(--tm-accent);font-weight:600;margin-bottom:8px;">模板加载失败</div>
  <div style="font-size:12px;color:var(--tm-text-hint);line-height:1.6;">
    <p>无法从远程加载界面模板</p>
    <p style="font-size:11px;margin-top:8px;">{{ERROR_MSG}}</p>
    <p style="font-size:11px;margin-top:4px;word-break:break-all;">请检查网络连接或刷新重试</p>
  </div>
</div>
</template>

<template id="tmpl-logPanel">
<div class="tm-cyber-log-wrap">
  <div class="tm-cyber-log-header">
    <span>抢码日志面板</span>
    <span class="tm-cyber-log-countdown">倒计时：<span id="tm-log-countdown">0.000</span></span>
  </div>
  <div class="tm-cyber-log-scroll" id="tm-log-scroll">[--:--:--] 等待中</div>
  <div class="tm-cyber-log-status">
    <span id="tm-log-status">就绪</span>
    <span>任务数：<span class="tm-cyber-log-task-count" id="tm-log-taskCount">0</span></span>
  </div>
</div>
</template>

<template id="tmpl-loginOverlay">
<div class="cyber-login-card">
  <div class="cyber-login-header">
    <div class="cyber-login-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1 class="cyber-login-title">授权登录</h1>
    <p class="cyber-login-subtitle" id="tmpl-loginReason">请完成验证以使用 BiliAuto 抢码系统</p>
  </div>

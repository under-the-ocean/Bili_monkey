<style>
/* ========== Material Design Tokens ========== */
:root {

/* ========== FAB ========== */

/* ========== Button ========== */
.tm-material-btn {

  overflow: hidden;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 40px;
  min-width: 72px;

}
.tm-material-btn::after {

  opacity: 0;

}
.tm-material-btn:hover::after { opacity: 0.08; }

}

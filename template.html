<style>
/* ========== Cyber Dark Design Tokens ========== */
:root {
  --tm-primary: #06b6d4;
  --tm-primary-dark: #0891b2;
  --tm-primary-light: #22d3ee;
  --tm-accent: #f87171;
  --tm-accent-dark: #dc2626;
  --tm-bg: #050816;
  --tm-bg-card: rgba(15, 23, 42, 0.92);
  --tm-text: rgba(255,255,255,0.87);
  --tm-text-secondary: rgba(255,255,255,0.54);
  --tm-text-hint: rgba(255,255,255,0.38);
  --tm-divider: rgba(255,255,255,0.08);
  --tm-input-bg: rgba(255,255,255,0.06);
  --tm-surface: rgba(255,255,255,0.04);
  --tm-surface-hover: rgba(255,255,255,0.08);
  --tm-shadow: 0 25px 50px -12px rgba(6,182,212,0.15);
  --tm-shadow-btn: 0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -2px rgba(0,0,0,0.2);
  --tm-radius: 12px;
  --tm-radius-btn: 8px;
  --tm-radius-chip: 32px;
  --tm-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --tm-transition: 0.2s cubic-bezier(.4,0,.2,1);
}

/* ========== FAB ========== */
#biliauto-fab {
  position: fixed;
  left: auto !important;
  right: 18px !important;
  top: auto !important;
  bottom: 18px !important;
  transform: scale(1) !important;
  z-index: 2147483647;
  width: 46px;
  height: 46px;
  border-radius: 14px;
  background: linear-gradient(135deg, #06b6d4, #0891b2);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(6,182,212,0.3);
  transition: opacity 0.25s cubic-bezier(.4,0,.2,1), transform 0.25s cubic-bezier(.4,0,.2,1), box-shadow 0.25s;

  -webkit-user-select: none;

}

  opacity: 0;
  transform: scale(0.4) !important;
  pointer-events: none;
}
#biliauto-fab:hover {
  box-shadow: 0 12px 32px rgba(6,182,212,0.45);
  transform: scale(1.08) !important;
}
#biliauto-fab:active {
  transform: scale(0.92) !important;
}
#biliauto-fab svg {
  display: block;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
}

/* ========== Panel ========== */
#biliauto-panel {

  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  overflow: hidden;
  display: flex;
  flex-direction: column;

}

}
#biliauto-panel,
#biliauto-panel * { box-sizing: border-box; }

/* ========== Header ========== */
.tm-cyber-header {

  justify-content: space-between;

.tm-cyber-header-title {

}
.tm-cyber-header-title .tm-cyber-brand {

}
.tm-cyber-header-badge {

/* ========== Icon Button ========== */
.tm-cyber-icon-btn {

  justify-content: center;

  font-size: 13px;
  line-height: 1;
}
.tm-cyber-icon-btn:hover {
  background: rgba(255,255,255,0.08);
  color: var(--tm-text);
}
.tm-cyber-icon-btn:active {
  background: rgba(255,255,255,0.12);
  transform: scale(0.92);
}

/* ========== Body ========== */
.tm-cyber-body {
  padding: 10px;
  overflow-y: auto;
  min-height: 0;
  flex: 1;
}
.tm-cyber-meta {

.tm-cyber-input {

}

}

/* ========== Button ========== */
.tm-cyber-btn {

  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 32px;
  min-width: 56px;

  border-radius: var(--tm-radius-btn);
  background: transparent;
  color: var(--tm-text-secondary);
  font-size: 12px;
  font-weight: 500;
  font-family: var(--tm-font);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  transition: var(--tm-transition);
  white-space: nowrap;
  transform: translateZ(0);
}
.tm-cyber-btn:hover {
  background: var(--tm-surface-hover);
  color: var(--tm-text);
  border-color: rgba(255,255,255,0.15);
}
.tm-cyber-btn:active {
  transform: scale(0.97);
}
.tm-cyber-btn-primary {
  background: linear-gradient(135deg, #06b6d4, #0891b2);
  color: #fff;
  border: none;
  box-shadow: var(--tm-shadow-btn);
}
.tm-cyber-btn-primary:hover {
  background: linear-gradient(135deg, #22d3ee, #06b6d4);
  color: #fff;
}
.tm-cyber-btn-primary:active {
  box-shadow: 0 5px 5px -3px rgba(0,0,0,0.2), 0 8px 10px 1px rgba(0,0,0,0.14);
  transform: scale(0.97);
}
.tm-cyber-btn-accent {
  color: var(--tm-accent);
  border-color: rgba(248,113,113,0.2);
}
.tm-cyber-btn-accent:hover {
  background: rgba(248,113,113,0.1);
  color: var(--tm-accent);
  border-color: rgba(248,113,113,0.3);
}
.tm-cyber-btn-sm {
  height: 28px;
  min-width: 44px;
  padding: 0 10px;
  font-size: 11px;
}
.tm-cyber-btn-xs {
  height: 24px;
  padding: 0 8px;
  font-size: 11px;
  border-radius: 6px;
  min-width: auto;
}

/* ========== Chip ========== */
.tm-cyber-chip {
  display: inline-flex;
  align-items: center;
  height: 28px;
  padding: 0 12px;
  border-radius: var(--tm-radius-chip);
  background: rgba(6,182,212,0.08);
  color: var(--tm-primary-light);
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  border: 1px solid rgba(6,182,212,0.15);
}

/* ========== Checkbox ========== */
.tm-cyber-check {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--tm-text);
  line-height: 1.4;
  cursor: pointer;
}
.tm-cyber-check input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border: 2px solid var(--tm-text-hint);
  border-radius: 4px;
  cursor: pointer;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: var(--tm-transition);
  position: relative;
  margin: 0;
  background: transparent;
}
.tm-cyber-check input[type="checkbox"]:checked {
  border-color: var(--tm-primary);
  background: var(--tm-primary);
}
.tm-cyber-check input[type="checkbox"]:checked::after {
  content: '';
  display: block;
  width: 4px;
  height: 8px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
  margin-top: -1px;
}

/* ========== List ========== */
.tm-cyber-list {
  max-height: 360px;
  overflow-y: visible;
  margin-top: 12px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.tm-cyber-list::-webkit-scrollbar { width: 4px; }
.tm-cyber-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

.tm-cyber-item {
  padding: 12px 14px;
  border-radius: var(--tm-radius-btn);
  margin-bottom: 8px;
  background: var(--tm-surface);
  border: 1px solid var(--tm-divider);
  animation: tm-rise-in 0.3s cubic-bezier(0.2, 0.9, 0.2, 1) both;
}

}
.tm-cyber-item-title {

}
.tm-cyber-item-id {

  word-break: break-all;
  margin-bottom: 8px;
  font-family: "SF Mono", "Cascadia Code", monospace;
  opacity: 0.8;
}
.tm-cyber-item-config {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 8px;
}
.tm-cyber-item-config input {
  padding: 5px 8px;
  font-size: 11px;
  text-align: center;
  border: 1px solid var(--tm-divider);
  border-radius: var(--tm-radius-btn);
  background: var(--tm-input-bg);
  color: var(--tm-text);
  outline: none;
  font-family: var(--tm-font);
  transition: border-color 0.15s;
}
.tm-cyber-item-config input:focus {
  border-color: var(--tm-primary);
  box-shadow: 0 0 0 2px rgba(6,182,212,0.15);
}
.tm-cyber-item-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.tm-cyber-empty {
  padding: 32px 12px;
  text-align: center;
  color: var(--tm-text-hint);
  font-size: 13px;
  line-height: 1.8;
}
.tm-cyber-status {
  font-size: 12px;
  color: var(--tm-text-secondary);
  margin-top: 12px;
  min-height: 20px;
  padding: 8px 0;
  text-align: center;
}
.tm-cyber-toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 10px;
}
.tm-cyber-separator {

}

/* ========== Login Overlay - Cyber Dark ========== */
#biliauto-login-overlay {
  position: fixed;

  z-index: 2147483647;

}

  opacity: 1;

}

  box-sizing: border-box;
}
.cyber-login-card {

}

}
.cyber-login-header {
  text-align: center;
  margin-bottom: 24px;
  position: relative;
  z-index: 1;
}
.cyber-login-icon {
  width: 56px;
  height: 56px;
  margin: 0 auto 12px;
  background: linear-gradient(135deg, #06b6d4, #0891b2);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  box-shadow: 0 8px 24px rgba(6,182,212,0.3);
}
.cyber-login-icon svg {
  width: 28px;

}
.cyber-login-title {
  font-size: 20px;

}

}

}

}
.cyber-login-code-chars {
  display: flex;

}

  z-index: 1;

  border: 1px solid var(--tm-divider);

}
.cyber-login-info-icon {
  width: 32px;
  height: 32px;
  background: rgba(6,182,212,0.1);

  flex-shrink: 0;
}
.cyber-login-info-icon svg {
  width: 16px;
  height: 16px;
}
.cyber-login-info-text {
  font-size: 12px;
  color: var(--tm-text-secondary);
  line-height: 1.4;
}

}
.cyber-login-status {

  font-size: 13px;

}
.cyber-login-btn {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;

  padding: 0 24px;
  border: none;
  border-radius: 10px;

/* ========== Login Status Badge in Header ========== */
.tm-cyber-status-badge {
  font-size: 11px;
  color: #22d3ee;
  background: rgba(6,182,212,0.1);
  padding: 2px 10px;
  border-radius: 10px;
  margin-left: 6px;
  white-space: nowrap;
  border: 1px solid rgba(6,182,212,0.2);
  font-weight: 500;
}

/* ========== Page Log Panel ========== */
.tm-cyber-log-wrap {
  font-size: 12px;
  color: #61666d;
  line-height: 1.6;
}
.tm-cyber-log-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  border-bottom: 1px solid #e3e5e7;
  margin-bottom: 8px;

  color: #000;
}

}

  color: #9499a0;
}

  font-weight: 600;
}

/* ========== Animations ========== */

  0% {
    opacity: 0;
    transform: translateY(8px) scale(0.98);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}
@keyframes tm-fade-in {
  0% { opacity: 0; }
  100% { opacity: 1; }
}
@keyframes cyber-water-drift {
  0% {
    transform: translate3d(-2%, -1%, 0) rotate(0deg);
  }
  100% {
    transform: translate3d(2%, 1%, 0) rotate(8deg);
  }
}

/* ========== Cyber Dark Variant (toggle alternative) ========== */
.tm-cyber-dark {
  --tm-bg-card: rgba(8, 12, 30, 0.96);
  --tm-surface: rgba(255,255,255,0.02);
  --tm-input-bg: rgba(255,255,255,0.03);
  --tm-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  --tm-primary: #22d3ee;
  --tm-primary-dark: #06b6d4;
  --tm-primary-light: #67e8f9;
}

    right: 12px !important;

  .tm-cyber-toolbar {

  .tm-cyber-btn {

    padding: 0 10px;
    height: 34px;
    font-size: 12px;
  }
  .tm-cyber-btn-sm {
    min-width: 44px;

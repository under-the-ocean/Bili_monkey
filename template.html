<style>
/* ========== Material Design Tokens ========== */
:root {
  --tm-primary: #50b6fe;
  --tm-primary-dark: #3a9ae0;
  --tm-accent: #ff5252;
  --tm-accent-dark: #d50000;
  --tm-bg: #ffffff;
  --tm-bg-card: #ffffff;
  --tm-text: rgba(0,0,0,0.87);
  --tm-text-secondary: rgba(0,0,0,0.54);
  --tm-text-hint: rgba(0,0,0,0.38);
  --tm-divider: rgba(0,0,0,0.12);
  --tm-input-bg: #f5f5f5;
  --tm-surface: #f5f5f5;
  --tm-shadow: 0 25px 50px -12px rgba(80,182,254,0.3);
  --tm-shadow-btn: 0 3px 1px -2px rgba(0,0,0,0.2), 0 2px 2px 0 rgba(0,0,0,0.14), 0 1px 5px 0 rgba(0,0,0,0.12);
  --tm-radius: 10px;
  --tm-radius-btn: 6px;
  --tm-radius-chip: 32px;
  --tm-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --tm-transition: 0.3s cubic-bezier(.4,0,.2,1);
}
#biliauto-panel.tm-material-dark {
  --tm-bg: #121212;
  --tm-bg-card: #1e1e1e;
  --tm-text: rgba(255,255,255,0.87);
  --tm-text-secondary: rgba(255,255,255,0.54);
  --tm-text-hint: rgba(255,255,255,0.38);
  --tm-divider: rgba(255,255,255,0.12);
  --tm-input-bg: #2c2c2c;
  --tm-surface: #1e1e1e;
  --tm-shadow: 0 11px 15px -7px rgba(0,0,0,0.4), 0 24px 38px 3px rgba(0,0,0,0.3), 0 9px 46px 8px rgba(0,0,0,0.25);
}

/* ========== FAB ========== */
#biliauto-fab {
  position: fixed;
  left: 50%!important;
  right: auto!important;
  top: 50%!important;
  transform: translate(-50%, -50%)!important;
  z-index: 2147483647;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--tm-primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 6px 10px 0 rgba(0,0,0,0.14), 0 1px 18px 0 rgba(0,0,0,0.12), 0 3px 5px -1px rgba(0,0,0,0.2);
  transition: opacity 0.25s cubic-bezier(.4,0,.2,1), transform 0.25s cubic-bezier(.4,0,.2,1), box-shadow 0.25s, background 0.25s;
  user-select: none;
  -webkit-user-select: none;
  opacity: 1;
  transform: scale(1);
}
#biliauto-fab.tm-fab-hidden {
  opacity: 0;
  transform: scale(0.4);
  pointer-events: none;
}
#biliauto-fab:hover {
  box-shadow: 0 8px 12px 0 rgba(0,0,0,0.18), 0 3px 20px 0 rgba(0,0,0,0.16), 0 3px 5px -1px rgba(0,0,0,0.24);
  background: var(--tm-primary-dark);
}
#biliauto-fab:active {
  transform: scale(0.92);
}
#biliauto-fab svg {
  display: block;
}
#biliauto-fab.tm-material-dark {
  background: #1e88e5;
}

/* ========== Panel ========== */
#biliauto-panel {
  position: fixed;
  right: 24px;
  top: 80px;
  z-index: 2147483646;
  width: 440px;
  max-width: calc(100vw - 48px);
  max-height: calc(100vh - 100px);
  font-family: var(--tm-font);
  color: var(--tm-text);
  background: var(--tm-bg-card);
  border-radius: var(--tm-radius);
  box-shadow: var(--tm-shadow);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateY(12px) scale(0.96);
  pointer-events: none;
  transition: opacity 0.25s cubic-bezier(.4,0,.2,1), transform 0.25s cubic-bezier(.4,0,.2,1);
}
#biliauto-panel.tm-panel-visible {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}
#biliauto-panel * { box-sizing: border-box; }

/* ========== Header ========== */
.tm-material-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  min-height: 44px;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  border-bottom: 1px solid var(--tm-divider);
  flex-shrink: 0;
}
.tm-material-header:active { cursor: grabbing; }
.tm-material-header-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--tm-text);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.tm-material-header-badge {
  font-size: 11px;
  font-weight: 400;
  color: var(--tm-text-secondary);
  background: var(--tm-input-bg);
  padding: 2px 8px;
  border-radius: var(--tm-radius-chip);
}
.tm-material-header-actions {
  display: flex;
  gap: 4px;
  cursor: default;
}

/* ========== Icon Button ========== */
.tm-material-icon-btn {
  position: relative;
  overflow: hidden;
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 50%;
  background: transparent;
  color: var(--tm-text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: background 0.15s;
  font-size: 18px;
  line-height: 1;
}
.tm-material-icon-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: currentColor;
  opacity: 0;
  transition: opacity 0.3s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
.tm-material-icon-btn:hover::after { opacity: 0.08; }
.tm-material-icon-btn:active::after { opacity: 0.16; transition: opacity 0.05s; }

/* ========== Body ========== */
.tm-material-body {
  padding: 14px 16px;
  overflow-y: auto;
  flex: 1;
}
.tm-material-meta {
  font-size: 12px;
  color: var(--tm-text-secondary);
  line-height: 1.6;
  margin-bottom: 12px;
  word-break: break-all;
  background: var(--tm-surface);
  padding: 10px 12px;
  border-radius: var(--tm-radius-btn);
}

/* ========== Input ========== */
.tm-material-input {
  width: 100%;
  border: none;
  border-radius: var(--tm-radius-btn);
  background: var(--tm-input-bg);
  color: var(--tm-text);
  padding: 10px 12px;
  outline: none;
  font-size: 13px;
  font-family: var(--tm-font);
  transition: background 0.15s;
}
.tm-material-input:focus {
  background: var(--tm-input-bg);
  box-shadow: 0 0 0 2px var(--tm-primary);
}
.tm-material-input::placeholder { color: var(--tm-text-hint); }
.tm-material-input-row {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}
.tm-material-input-row .tm-material-input { flex: 1; }
.tm-material-compact-controls {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 6px;
  margin-bottom: 6px;
}
.tm-material-compact-controls + .tm-material-input {
  margin-top: 0;
}


/* ========== Button ========== */
.tm-material-btn {
  position: relative;
  overflow: hidden;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 40px;
  min-width: 72px;
  padding: 0 18px;
  border: none;
  border-radius: var(--tm-radius-btn);
  background: transparent;
  color: var(--tm-primary);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--tm-font);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  transition: var(--tm-transition);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  white-space: nowrap;
}
.tm-material-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--tm-radius-btn);
  background: currentColor;
  opacity: 0;
  transition: opacity 0.3s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
.tm-material-btn:hover::after { opacity: 0.08; }
.tm-material-btn:active::after { opacity: 0.16; transition: opacity 0.05s; }
.tm-material-btn-primary {
  background: var(--tm-primary);
  color: #fff;
  box-shadow: var(--tm-shadow-btn);
}
.tm-material-btn-primary:hover { background: var(--tm-primary-dark); }
.tm-material-btn-primary::after { display: none; }
.tm-material-btn-primary:active { box-shadow: 0 5px 5px -3px rgba(0,0,0,0.2), 0 8px 10px 1px rgba(0,0,0,0.14), 0 3px 14px 2px rgba(0,0,0,0.12); }
.tm-material-btn-accent { color: var(--tm-accent); }
.tm-material-btn-sm {
  height: 32px;
  min-width: 52px;
  padding: 0 12px;
  font-size: 12px;
}

/* ========== Chip ========== */
.tm-material-chip {
  display: inline-flex;
  align-items: center;
  height: 30px;
  padding: 0 12px;
  border-radius: var(--tm-radius-chip);
  background: var(--tm-surface);
  color: var(--tm-text-secondary);
  font-size: 12px;
  font-weight: 400;
  white-space: nowrap;
}

/* ========== Checkbox ========== */
.tm-material-check {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--tm-text);
  line-height: 1.4;
  cursor: pointer;
}
.tm-material-check input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border: 2px solid var(--tm-text-hint);
  border-radius: 3px;
  cursor: pointer;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: var(--tm-transition);
  position: relative;
  margin: 0;
}
.tm-material-check input[type="checkbox"]:checked {
  border-color: var(--tm-primary);
  background: var(--tm-primary);
}
.tm-material-check input[type="checkbox"]:checked::after {
  content: '';
  display: block;
  width: 4px;
  height: 8px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
  margin-top: -1px;
}

/* ========== List ========== */
.tm-material-list {
  max-height: 350px;
  overflow-y: auto;
  margin-top: 10px;
  scrollbar-width: thin;
  scrollbar-color: var(--tm-divider) transparent;
}
.tm-material-list::-webkit-scrollbar { width: 5px; }
.tm-material-list::-webkit-scrollbar-thumb { background: var(--tm-divider); border-radius: 4px; }

.tm-material-item {
  padding: 12px;
  border-radius: var(--tm-radius-btn);
  margin-bottom: 10px;
  background: var(--tm-surface);
  border: 1px solid var(--tm-divider);
}
.tm-material-item:last-child { margin-bottom: 0; }
.tm-material-item-title {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.5;
  margin-bottom: 4px;
  color: var(--tm-text);
}
.tm-material-item-id {
  font-size: 11px;
  color: var(--tm-primary);
  word-break: break-all;
  margin-bottom: 8px;
  font-family: "SF Mono", monospace;
  opacity: 0.8;
}
.tm-material-item-config {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 8px;
}
.tm-material-item-config input {
  padding: 5px 8px;
  font-size: 11px;
  text-align: center;
  border: none;
  border-radius: var(--tm-radius-btn);
  background: var(--tm-input-bg);
  color: var(--tm-text);
  outline: none;
  font-family: var(--tm-font);
  transition: box-shadow 0.15s;
}
.tm-material-item-config input:focus {
  box-shadow: 0 0 0 2px var(--tm-primary);
}
.tm-material-item-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.tm-material-empty {
  padding: 24px 12px;
  text-align: center;
  color: var(--tm-text-hint);
  font-size: 13px;
}
.tm-material-status {
  font-size: 12px;
  color: var(--tm-text-secondary);
  margin-top: 12px;
  min-height: 20px;
  padding: 8px 0;
  text-align: center;
}
.tm-material-toolbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 10px;
}
.tm-material-separator {
  flex: 1;
}

/* login styles removed: plain login is rendered by script */

@media (max-width: 600px) {
  #biliauto-panel {
    width: calc(100vw - 24px);
    max-width: none;
    bottom: 16px;
    left: 12px !important;
    right: 12px !important;
    transform: none !important;
  }
  .tm-material-header-title {
    font-size: 14px;
  }
  .tm-material-item-config {
    grid-template-columns: 1fr;
    gap: 4px;
  }
  .tm-material-item-actions {
    justify-content: flex-start;
  }
  .tm-material-toolbar {
    flex-wrap: wrap;
  }
  .tm-material-btn {
    min-width: 60px;
    padding: 0 12px;
    height: 36px;
    font-size: 12px;
  }
  .tm-material-btn-sm {
    min-width: 44px;
    padding: 0 8px;
  }
}
</style>

<div class="tm-material-header">
  <span class="tm-material-header-title">
BiliAuto
<span class="tm-material-header-badge">v${CONFIG.VERSION}</span>
  </span>
  <span class="tm-material-header-actions">
<button class="tm-material-icon-btn" data-ba="logout" title="退出登录">🚪</button>
<button class="tm-material-icon-btn" data-ba="copyPageInfo" title="复制当前页面信息">📋</button>
<button class="tm-material-icon-btn" data-ba="toggleDark" title="切换夜间模式">🌙</button>
<button class="tm-material-icon-btn" data-ba="closePanel" title="关闭面板">✕</button>
  </span>
</div>

<div class="tm-material-body">

  <div class="tm-material-meta" data-ba="meta"></div>

  <div class="tm-material-toolbar">
<div class="tm-material-input" style="flex:1;padding:10px 12px;font-size:12px;color:var(--tm-text-secondary);background:var(--tm-surface);border-radius:var(--tm-radius-btn);" data-ba="currentConfig">
<div style="margin-bottom:8px;font-weight:600;">🎯 当前页面抢码配置</div>
<div style="display:flex;gap:8px;align-items:center;">
<input data-ba="currentTaskConfig" data-field="start_time" placeholder="开始时间" style="flex:1;padding:6px 8px;border:1px solid rgba(0,0,0,.12);border-radius:4px;font-size:12px;" title="开始时间，支持格式: 00:30:00 或 +30">
<input data-ba="currentTaskConfig" data-field="interval" placeholder="间隔" style="width:60px;padding:6px 8px;border:1px solid rgba(0,0,0,.12);border-radius:4px;font-size:12px;text-align:center;" title="点击间隔(秒)">
<input data-ba="currentTaskConfig" data-field="duration" placeholder="持续" style="width:60px;padding:6px 8px;border:1px solid rgba(0,0,0,.12);border-radius:4px;font-size:12px;text-align:center;" title="持续时长(秒)">
</div>
<div style="display:flex;gap:8px;margin-top:8px;">
<button class="tm-material-btn" data-ba="testClick" style="flex:1;">👆 测试点击</button>
<button class="tm-material-btn tm-material-btn-primary" data-ba="runCurrent" style="flex:1;">🚀 开始抢码</button>
</div>
</div>
  </div>

  <div class="tm-material-toolbar">
<input class="tm-material-input" data-ba="addTaskInput" placeholder="添加 task_id" style="flex:1">
<button class="tm-material-btn" data-ba="addTask">添加</button>
  </div>

  <div class="tm-material-input-row tm-material-compact-controls">
    <input class="tm-material-input" data-ba="manual" placeholder="输入 task_id 后跳转">
    <button class="tm-material-btn" data-ba="manualJump">跳转</button>
  </div>
  <input class="tm-material-input" data-ba="filter" placeholder="筛选任务名称或 ID">

  <div class="tm-material-list" data-ba="list"></div>

  <div class="tm-material-toolbar" style="margin-top:8px;justify-content:flex-end">
<div style="display:flex;gap:4px">
  <button class="tm-material-btn tm-material-btn-sm" data-ba="refresh">刷新</button>
</div>
  </div>

  <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
<span class="tm-material-chip" data-ba="taskCount">0 个任务</span>
  </div>

  <div class="tm-material-status" data-ba="status"></div>
</div>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiliAuto 登录</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2350b6fe'><path d='M12 2L2 7l10 5 10-5-10-5z'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#50b6fe',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: {{custom_font_family}}; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .code-char { display: inline-block; width: 3rem; height: 4rem; line-height: 4rem; background: white; border-radius: 1rem; margin: 0 0.25rem; font-size: 2rem; font-weight: 800; color: #50b6fe; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .bg-primary { background-color: #50b6fe; }
        .text-primary { color: #50b6fe; }
        .border-primary { border-color: #50b6fe; }
        .shadow-primary { box-shadow: 0 10px 15px -3px #50b6fe33; }
        /* 桌面端左右布局 - 合并为一个框 */
        @media (min-width: 1024px) {
            .desktop-container {
                max-width: 800px;
                width: 100%;
            }
            .desktop-inner {
                display: grid;
                grid-template-columns: 50% 50%;
                gap: 0;
            }
            .desktop-left, .desktop-right {
                width: 100%;
                box-sizing: border-box;
            }
            .mobile-only {
                display: none !important;
            }
        }
        /* 移动端单列布局 */
        @media (max-width: 1023px) {
            .desktop-container {
                max-width: 28rem;
                width: 100%;
            }
            .desktop-left {
                display: none;
            }
            .desktop-right {
                padding-left: 0 !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-4 bg-[radial-gradient(circle_at_bottom_right,_var(--tw-gradient-stops))] from-indigo-100 via-slate-50 to-teal-50">
    <div class="desktop-container mx-auto">
        <div class="glass rounded-[2.5rem] shadow-2xl shadow-primary/30 p-6 sm:p-8 md:p-10 border border-white">
            <!-- 桌面端左右布局 -->
            <div class="desktop-inner">
                <!-- 桌面端左侧：应用信息和权限 -->
                <div class="desktop-left text-left p-6" style="padding-right: 2rem;">
                    <div class="flex items-center gap-4 mb-8">
                        <div style="width: 64px; height: 64px; flex-shrink: 0;">
                            {{icon_html}}
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">授权登录</h1>
                            <p class="text-slate-500 mt-1 font-medium text-sm"><strong class="text-primary">BiliAuto 抢码系统</strong> 请求访问你的账号</p>
                        </div>
                    </div>
                    
                    <div>
                        <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">请求的权限</p>
                        <div class="space-y-2">
                            {{scope_items}}
                        </div>
                    </div>
                </div>
                
                <!-- 右侧：验证码和操作 -->
                <div class="desktop-right text-center" style="padding-left: 2rem;">
                    <!-- 移动端显示的应用信息 -->
                    <div class="mobile-only mb-6">
                        <div class="mx-auto mb-6" style="width: 64px; height: 64px;">
                            {{icon_html}}
                        </div>
                        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">授权登录</h1>
                        <p class="text-slate-500 mt-1 font-medium text-sm"><strong class="text-primary">BiliAuto 抢码系统</strong> 请求访问你的账号</p>
                    </div>

                    <div class="bg-primary rounded-3xl p-6 mb-6 shadow-xl shadow-primary/30 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                            <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
                                <path d="M0 100 C 20 0 50 0 100 100 Z" fill="white"></path>
                            </svg>
                        </div>
                        <p class="text-white/70 text-xs font-bold uppercase tracking-[0.2em] mb-3 relative z-10">验证码</p>
                        <div class="flex justify-center relative z-10">
                            {{code_chars_html}}
                        </div>
                    </div>

                    <!-- 验证码下方的验证方式说明 -->
                    <div class="space-y-3 mb-6 text-left">
                        {{group_info}}
                        {{private_info}}
                    </div>

                    <!-- 移动端显示的权限 -->
                    <div class="mobile-only">
                        <div class="mb-6 text-left">
                            <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">请求的权限</p>
                            <div class="space-y-2">
                                {{scope_items}}
                            </div>
                        </div>
                    </div>

                    <div id="status" class="hidden flex items-center justify-center gap-3 py-4 px-6 bg-slate-50 rounded-2xl border border-slate-100 mb-4">
                        <div class="w-5 h-5 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
                        <span class="text-sm font-bold text-slate-500">等待验证中...</span>
                    </div>
                    
                    <div id="successStatus" class="hidden flex items-center justify-center gap-3 py-4 px-6 bg-teal-50 rounded-2xl border border-teal-100 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-teal-600" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                        </svg>
                        <span class="text-sm font-bold text-teal-600">验证成功！</span>
                    </div>
                    
                    <button id="confirmBtn" onclick="checkAndRedirect()" class="w-full py-3.5 bg-primary hover:opacity-90 text-white font-bold rounded-2xl shadow-lg shadow-primary/30 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                        完成并继续
                    </button>
                    
                    <div class="mt-6 text-rose-500 text-sm font-medium hidden" id="errorMsg"></div>
                </div>
            </div>
        </div>
        <p class="text-center text-slate-400 text-sm mt-8">Powered by <a href="https://github.com/AstrBotDevs/AstrBot" target="_blank" class="text-primary hover:opacity-80">AstrBot</a> & <a href="https://www.chuyel.cn" target="_blank" class="text-primary hover:opacity-80">BiliAuto 抢码系统</a></p>
    </div>

    <script>
        var sessionId = window._BILI_LOGIN_SESSION_ID || '{{session_id}}';
        var code = window._BILI_LOGIN_CODE || '{{code}}';
        var isVerified = false;
        var redirected = false;
        var lastClickTime = 0;
        var CLICK_INTERVAL = 2000;
        var callbackUrl = window._BILI_LOGIN_CALLBACK_URL || "";
        var checkIntervalId = null;
        var POLL_INTERVAL_MS = {{poll_interval_ms}};
        
        function doRedirect() {
            if (redirected) return;
            redirected = true;
            window.location.href = '{{redirect_uri}}?code={{auth_code}}&state={{state}}';
        }

        function updateUIForVerified() {
            if (isVerified) return;
            isVerified = true;

            var statusEl = document.getElementById('status');
            var successStatusEl = document.getElementById('successStatus');
            var confirmBtn = document.getElementById('confirmBtn');
            var errorMsg = document.getElementById('errorMsg');

            if (statusEl) statusEl.classList.add('hidden');
            if (successStatusEl) successStatusEl.classList.remove('hidden');
            if (confirmBtn) {
                confirmBtn.textContent = '验证成功，点击继续';
                confirmBtn.classList.add('bg-teal-500');
                confirmBtn.classList.remove('bg-primary');
                confirmBtn.disabled = false;
            }
            if (errorMsg) errorMsg.classList.add('hidden');
        }

        // 通用的会话状态检查函数
        function fetchSessionStatus(onSuccess, onError) {
            var xhr = new XMLHttpRequest();
            var url = '../api/session/status?session_id=' + sessionId + '&_t=' + Date.now();
            xhr.open('GET', url, true);
            xhr.setRequestHeader('Cache-Control', 'no-cache');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            if (data.success === true && data.verified === true) {
                                onSuccess(data);
                            } else {
                                if (onError) onError('not_verified');
                            }
                        } catch (e) {
                            if (onError) onError('parse_error');
                        }
                    } else {
                        if (onError) onError('network_error');
                    }
                }
            };
            xhr.send();
        }

        function checkAndRedirect() {
            var now = Date.now();
            var errorMsg = document.getElementById('errorMsg');

            // 如果已经验证过了，直接跳转
            if (isVerified) {
                doRedirect();
                return;
            }

            // 检查是否在2秒冷却期内
            if (now - lastClickTime < CLICK_INTERVAL) {
                errorMsg.textContent = '请稍后再试（每2秒可请求一次）';
                errorMsg.classList.remove('hidden');
                return;
            }

            lastClickTime = now;
            errorMsg.classList.add('hidden');

            // 显示加载状态
            var btn = document.getElementById('confirmBtn');
            var originalText = btn.textContent;
            btn.textContent = '检查中...';
            btn.disabled = true;

            // 使用通用函数
            fetchSessionStatus(
                function(data) {
                    // 成功回调
                    updateUIForVerified();
                    // 延迟一下再跳转，让用户看到验证成功的状态
                    setTimeout(doRedirect, 800);
                },
                function(errorType) {
                    // 错误回调
                    if (errorType === 'not_verified') {
                        errorMsg.textContent = '尚未完成验证，请在QQ中发送验证码';
                    } else if (errorType === 'parse_error') {
                        errorMsg.textContent = '解析响应失败';
                    } else if (errorType === 'network_error') {
                        errorMsg.textContent = '网络错误，请重试';
                    }
                    errorMsg.classList.remove('hidden');
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            );
        }
        
        function checkStatus() {
            if (isVerified) return;

            // 使用通用函数（轮询场景不需要错误处理）
            fetchSessionStatus(
                function(data) {
                    if (!isVerified) {
                        updateUIForVerified();
                        // 验证成功后停止轮询
                        if (checkIntervalId) {
                            clearInterval(checkIntervalId);
                            checkIntervalId = null;
                        }
                    }
                }
                // 不传入错误回调，轮询失败时静默忽略
            );
        }
        
        // 页面可见性变化时立即检查
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden && !isVerified) {
                checkStatus();
            }
        });
        
        // 窗口获得焦点时立即检查（多次）
        window.addEventListener('focus', function() {
            if (!isVerified) {
                lastPollTime = 0;
                checkStatus();
                for (var i = 1; i <= 10; i++) {
                    setTimeout(function() {
                        if (!isVerified) checkStatus();
                    }, i * 100);
                }
            }
        });
        
        // 页面加载后立即开始
        checkStatus();
        checkIntervalId = setInterval(checkStatus, POLL_INTERVAL_MS);
    </script>
</body>
</html>
